name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - name: Check out the code
      uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        TAG_DATE=$(date +%Y-%m-%d)
        docker build . --file Dockerfile --tag ghcr.io/egormak/tracker-server:$TAG_DATE --tag ghcr.io/egormak/tracker-server:latest
    - name: 'Login to GitHub Container Registry'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{secrets.GITHUB_TOKEN}}
    - name: Push the Docker image
      run: |
        TAG_DATE=$(date +%Y-%m-%d)
        docker push ghcr.io/egormak/tracker-server:$TAG_DATE
        docker push ghcr.io/egormak/tracker-server:latest
      