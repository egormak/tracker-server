      description: Creates TaskDefinitions for today based on active schedule
      operationId: applySchedule
      responses:
        '200':
          description: Schedule applied successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/schedule/{id}:
    get:
      tags:
        - Schedule
      summary: Get schedule by ID
      description: Retrieve a specific schedule by its ID
      operationId: getSchedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Schedule ID
      responses:
        '200':
          description: Schedule retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    $ref: "#/components/schemas/WeeklySchedule"
        '400':
          description: Invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Schedule
      summary: Update schedule
      description: Update an existing schedule
      operationId: updateSchedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Schedule ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monday:
                  $ref: "#/components/schemas/DaySchedule"
                tuesday:
                  $ref: "#/components/schemas/DaySchedule"
                wednesday:
                  $ref: "#/components/schemas/DaySchedule"
                thursday:
                  $ref: "#/components/schemas/DaySchedule"
                friday:
                  $ref: "#/components/schemas/DaySchedule"
                saturday:
                  $ref: "#/components/schemas/DaySchedule"
                sunday:
                  $ref: "#/components/schemas/DaySchedule"
      responses:
        '200':
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Schedule
      summary: Delete schedule
      description: Delete a schedule by ID
      operationId: deleteSchedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Schedule ID
      responses:
        '200':
          description: Schedule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '400':
          description: Invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/schedule/{id}/activate:
