  # Schedule endpoints
  /api/v1/schedule:
    post:
      tags:
        - Schedule
      summary: Create weekly schedule
      description: Create a new weekly schedule configuration
      operationId: createSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleRequest"
      responses:
        '201':
          description: Schedule created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      schedule_id:
                        type: string
                      is_active:
                        type: boolean
                  message:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/schedule/active:
    get:
      tags:
        - Schedule
      summary: Get active schedule
      description: Retrieve the currently active weekly schedule
      operationId: getActiveSchedule
      responses:
        '200':
          description: Active schedule retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    $ref: "#/components/schemas/WeeklySchedule"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/schedule/active/today:
    get:
      tags:
        - Schedule
      summary: Get today's schedule with rollovers
      description: Returns today's scheduled tasks merged with incomplete tasks from previous days
      operationId: getTodaySchedule
      responses:
        '200':
          description: Today's schedule with rollovers
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    $ref: "#/components/schemas/ActiveSchedule"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/schedule/active/rollover:
    get:
      tags:
        - Schedule
      summary: Get rollover tasks
      description: Get incomplete tasks from previous days
      operationId: getRolloverTasks
      parameters:
        - name: day
          in: query
          schema:
            type: string
          description: Day to calculate rollovers for (defaults to today)
      responses:
        '200':
          description: Rollover tasks retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      day:
                        type: string
                      rollover_tasks:
                        type: array
                        items:
                          $ref: "#/components/schemas/RolloverTask"
                      count:
                        type: integer
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

