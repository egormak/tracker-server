openapi: 3.1.0
info:
  title: Tracker Server API
  description: |
    API for time tracking with three main roles: Work, Learn, and Rest.
    This service helps track time spent on various tasks and manage schedules.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Development (Docker host mapping 8080->3000)
  - url: http://localhost:3000
    description: Local server (direct)
tags:
  - name: Task
    description: Task management operations
  - name: TaskRecord
    description: Task record operations
  - name: Rest
    description: Rest time management
  - name: Statistics
    description: Statistical information
  - name: Role
    description: Role management
  - name: Timer
    description: Timer operations
  - name: Management
    description: System management operations
  - name: Schedule
    description: Weekly schedule management with automatic rollover logic
  - name: General
    description: General API endpoints

paths:
  /:
    get:
      tags:
        - General
      summary: Welcome endpoint
      description: Returns a welcome message
      operationId: welcome
      responses:
        '200':
          description: Welcome message
          content:
            text/html:
              schema:
                type: string
                example: "Welcome to Tracker Server API"

  /api/v1/stats/done/today:
    get:
      tags:
        - Statistics
      summary: Get today's completion statistics
      description: Get time completed for today
      operationId: getStatsDoneToday
      responses:
        '200':
          description: Successfully retrieved today's task results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResult"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/stats/tasks/today:
    get:
      tags:
        - Statistics
      summary: Get today's tasks (planned vs done)
      description: Alias of /api/v1/stats/done/today; returns TaskResult list
      operationId: getStatsTasksToday
      responses:
        '200':
          description: Successfully retrieved today's task results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResult"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/task/params:
    get:
      tags:
        - Task
      summary: Get task parameters
      description: Retrieve parameters for a specific task
      operationId: getTaskParams
      parameters:
        - name: task_name
          in: query
          description: Name of the task
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task parameters retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskParams"
        '404':
          description: Task not found or parameters are old
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/taskrecord:
    post:
      tags:
        - TaskRecord
      summary: Add a task record
      description: Record time spent on a task
      operationId: addTaskRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRecordRequest"
      responses:
        '200':
          description: Record added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/task/plan/percent:
    get:
      tags:
        - Task
      summary: Get task plan percent
      description: Get the next task based on plan percentage
      operationId: getTaskPlanPercent
      responses:
        '200':
          description: Task plan percentage retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanPercentResponse"
        '404':
          description: No tasks available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/task/plan/percent/schedule:
    get:
      tags:
        - Task
        - Schedule
      summary: Get task plan percent with schedule awareness
      description: |
        Get the next task based on plan percentage, considering weekly schedule and rollover tasks.
        
        **Two modes of operation:**
        1. **Automatic selection** (no task_name): Returns the next available task based on schedule priority
        2. **Specific task search** (with task_name): Searches for a specific task by name from Monday through today, finding available rollover tasks from previous days
        
        When searching for a specific task, the endpoint searches from Monday of the current week to today (current day), checking both:
        - Rollover tasks (incomplete tasks from previous days) - these will have source_day field populated
        - Today's scheduled tasks - these will have source_day empty or omitted
      operationId: getTaskPlanPercentWithSchedule
      parameters:
        - name: task_name
          in: query
          required: false
          description: |
            Optional. Name of a specific task to search for in the schedule.
            If provided, searches from Monday through today for this task.
            If not provided, returns the next task based on automatic schedule selection.
          schema:
            type: string
          example: "work"
      responses:
        '200':
          description: Task plan percentage retrieved successfully with schedule context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanPercentResponse"
              examples:
                automaticSelection:
                  summary: Automatic task selection (no task_name provided)
                  value:
                    task_name: "learn"
                    percent: 80
                    time_left: 90
                    source_day: ""
                rolloverTask:
                  summary: Specific task from previous day (Monday)
                  value:
                    task_name: "work"
                    percent: 50
                    time_left: 120
                    source_day: "monday"
                todayTask:
                  summary: Specific task from today
                  value:
                    task_name: "learn"
                    percent: 80
                    time_left: 90
                    source_day: ""
        '400':
          description: Missing or invalid task_name parameter (only when task_name is provided but empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: "error"
                message: "task_name parameter is required"
        '404':
          description: No tasks available or specific task not found in schedule from Monday to today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                taskNotFound:
                  summary: Specific task not found
                  value:
                    status: "error"
                    message: "Task 'exercise' not found in schedule from Monday to Wednesday"
                noTasksAvailable:
                  summary: No tasks available (automatic mode)
                  value:
                    status: "error"
                    message: "No tasks available"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/record/params:
    get:
      deprecated: true
      tags:
        - Task
      summary: Get task parameters (legacy)
      description: Legacy endpoint - use /api/v1/task/params instead
      operationId: getTaskParamsLegacy
      parameters:
        - name: task_name
          in: query
          description: Name of the task
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task parameters retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskParams"
        '404':
          description: Task not found or parameters are old
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      deprecated: true
      tags:
        - Task
      summary: Set task params (legacy)
      operationId: setTaskParamsLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTaskParamsRequest"
      responses:
        '200':
          description: Parameters set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/rest/add:
    post:
      tags:
        - Rest
      summary: Add rest time
      description: Add rest time to the account
      operationId: addRest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestRecordRequest"
      responses:
        '200':
          description: Rest time added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/rest/spend:
    post:
      tags:
